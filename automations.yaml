- id: '1758276516032'
  alias: Vaatwasser beste tijd
  description: ''
  triggers:
  - trigger: time
    at: 06:45:00
  conditions: []
  actions:
  - action: notify.mobile_app_ruben_mobiel
    metadata: {}
    data:
      message: "{%- set kwh_pattern = [0.164, 0.168, 0.023, 0.007, 0.085, 0.091, 0.007,
        0.011, 0.008, 0.018, 0.185, 0.044, 0.006, 0.008, 0.008, 0.006, 0.007, 0.008,
        0.006, 0.007, 0.012, 0.006, 0.009, 0.005, 0.007, 0.006, 0.005, 0.007, 0.009,
        0.164, 0.044, 0.107, 0.137] %} \n{%- set resolution_in_minutes = 5 %} \n{%-
        set start_time = now().replace(hour=0).replace(minute=0).replace(second=0).replace(microsecond=0)
        %} \n{%- set list = namespace(expected_costs=[], time=start_time) %} {# Calculating
        until 20:30 #} \n{%- set amount_of_calculations = 22 * (60 // resolution_in_minutes)
        %} {#2 dagen met een resolutie van 5 minuten#} \n{%- for _ in range(0, amount_of_calculations)
        %}\n  {%- set time_loop = list.time %}\n  {%- set ns = namespace(costs=0,
        solaropwek = 0, time=time_loop) %}\n  {%- for kwh in kwh_pattern %}\n    {#-
        half uur correctie #}\n    {%- if ns.time.minute < 30 %}\n      {%- set correctie
        = 0 %}\n    {%- else %}\n      {%- set correctie = 1 %}\n    {%- endif %}\n
        \   {%- set solar = state_attr('sensor.solcast_pv_forecast_forecast_today',
        'detailedForecast')[(ns.time.hour*2) + correctie].pv_estimate/6 %}\n    {%-
        if solar < kwh %}\n      {%- set ns.costs = ns.costs + (kwh-solar) * 0.31
        %}\n    {%- endif %}\n    {%- set ns.time = ns.time + timedelta(minutes=resolution_in_minutes)
        %}\n  {%- endfor %} \n  {%- set start_time = time_loop %}\n  {%- set add_item
        = {'start': start_time, 'solar': ns.solaropwek ,'costs': ns.costs | round(5)}
        %}\n  {%- set list.expected_costs = list.expected_costs + [add_item] %}\n
        \ {%- set list.time = list.time + timedelta(minutes=resolution_in_minutes)
        %}\n{%- endfor %} \n{%- set sorted_list = list.expected_costs | sort(attribute='start')|
        sort(attribute='costs') %} \nstart de vaatwasser om {{sorted_list[1].start}}
        dan kost het {{sorted_list[1].costs}}\n"
  mode: single
- id: '1721203134218'
  alias: Cube2
  description: ''
  triggers:
  - event_type: zha_event
    event_data:
      device_id: 9138f5df8d4edb5bc0aa9f4ba36a77b3
    trigger: event
  actions:
  - variables:
      command: '{{ trigger.event.data.command }}'
      value: '{{ trigger.event.data.args.value | default(0) }}'
      flip_degrees: '{{ trigger.event.data.args.flip_degrees | default(0) }}'
      flip_any: false
      flip_90: false
      flip_180: false
      slide_any_side: false
      knock_any_side: false
      rotate_any_side: false
      flip90: 64
      flip180: 128
      slide: 256
      knock: 512
      shake: 0
      drop: 3
      active_face_entity: input_number.cube
      active_face: '{{ states(active_face_entity) | int }}'
      activated_face: "\n{% if command == \"slide\" or command == \"knock\" %}\n\n
        \ {% if trigger.event.data.args.activated_face == 1 %} 1\n\n  {% elif trigger.event.data.args.activated_face
        == 2 %} 2\n\n  {% elif trigger.event.data.args.activated_face == 3 %} 3\n\n
        \ {% elif trigger.event.data.args.activated_face == 4 %} 4\n\n  {% elif trigger.event.data.args.activated_face
        == 5 %} 5\n\n  {% elif trigger.event.data.args.activated_face == 6 %} 6\n\n
        \ {% endif %}\n\n{% elif command == 'flip' %}\n\n  {{ trigger.event.data.args.activated_face
        | int }}\n\n{% endif %}\n"
      from_face: "\n{% if command == \"flip\" and flip_degrees == 90 %}\n\n  {{ ((value
        - flip90 - (trigger.event.data.args.activated_face - 1)) / 8) + 1 | int }}\n\n{%
        endif %}\n"
      relative_degrees: "\n{% if command == \"rotate_right\" or command == \"rotate_left\"
        %}\n\n  {{ trigger.event.data.args.relative_degrees | float }}\n\n{% endif
        %}\n"
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ command == ''checkin'' }}'
      sequence: []
    - conditions:
      - condition: template
        value_template: '{{ command == ''flip'' }}'
      sequence:
      - target:
          entity_id: '{{ active_face_entity }}'
        data:
          value: '{{ activated_face | int }}'
        action: input_number.set_value
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ flip_any }}'
          sequence:
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ activated_face == 1 }}'
              sequence: []
            - conditions:
              - condition: template
                value_template: '{{ activated_face == 2 }}'
              sequence: []
            - conditions:
              - condition: template
                value_template: '{{ activated_face == 3 }}'
              sequence: []
            - conditions:
              - condition: template
                value_template: '{{ activated_face == 4 }}'
              sequence: []
            - conditions:
              - condition: template
                value_template: '{{ activated_face == 5 }}'
              sequence: []
            - conditions:
              - condition: template
                value_template: '{{ activated_face == 6 }}'
              sequence: []
        - conditions:
          - condition: template
            value_template: '{{ flip_degrees == 90 and flip_90 }}'
          sequence: []
        - conditions:
          - condition: template
            value_template: '{{ flip_degrees == 180 and flip_180 }}'
          sequence: []
        - conditions:
          - condition: template
            value_template: '{{ flip_degrees == 90 and activated_face == 1 }}'
          sequence:
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ from_face == 2 }}'
              sequence: []
            - conditions:
              - condition: template
                value_template: '{{ from_face == 3 }}'
              sequence: []
            - conditions:
              - condition: template
                value_template: '{{ from_face == 5 }}'
              sequence: []
            - conditions:
              - condition: template
                value_template: '{{ from_face == 6 }}'
              sequence: []
        - conditions:
          - condition: template
            value_template: '{{ flip_degrees == 90 and activated_face == 2 }}'
          sequence:
          - choose:
            - conditions:
              - condition: template
                value_template: '{{ from_face == 1 }}'
              sequence: []
            - conditions:
              - condition: template
                value_template: '{{ from_face == 3 }}'
              sequence: []
            - conditions:
              - condition: template
                value_template: '{{ from_face == 4 }}'
              sequence: []
            - conditions:
              - condition: template
                value_template: '{{ from_face == 6 }}'
              sequence: []
        - conditions:
