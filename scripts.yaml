blinds_set:
  sequence:
  - action: cover.set_cover_tilt_position
    metadata: {}
    data:
      tilt_position: '{{target_pos}}'
    target:
      entity_id: '{{target_blind}}'
  alias: Blinds set
  fields:
    target_pos:
      description: The desired Blinds position
      example: 80
      required: true
      selector:
        number:
          min: 1
          max: 100
      default: 80
    target_blind:
      required: true
      selector:
        entity: {}
  description: description
  mode: single
play_favorite_playlist:
  fields:
    entity:
      selector:
        entity:
          domain:
          - media_player
          multiple: false
      default: media_player.werkkamer_music
      name: Entity
      description: Entity you want the music to start playing on
    playlist:
      selector:
        text:
      default: spotify:user:spotify:playlist:37i9dQZF1DWYPwGkJoztcR
      name: playlist
      description: Playlist media ID for example a Spotify URI
  sequence:
  - action: input_text.set_value
    metadata: {}
    data:
      value: '{{playlist}}'
    target:
      entity_id: input_text.music_playlist
  - action: media_player.play_media
    data_template:
      entity_id: '{{entity}}'
      media_content_id: '{{playlist}}'
      media_content_type: playlist
  alias: Play Favorite Playlist
  description: ''
set_playlist_and_play:
  sequence:
  - action: input_text.set_value
    metadata: {}
    data:
      value: '{{playlist}}'
    target:
      entity_id: input_text.music_playlist
  - choose:
    - conditions:
      - condition: state
        entity_id: media_player.music
        state: playing
      sequence:
      - action: music_assistant.play_media
        metadata: {}
        data:
          media_type: playlist
          media_id: '{{states("input_text.music_playlist")| string}}

            '
          enqueue: replace
        target:
          entity_id: '{{state_attr("media_player.music", "active_child")|string}}

            '
  fields:
    playlist:
      selector:
        text:
      default: https://open.spotify.com/playlist/1C4xhQw4BRYlK075PRUhzP
      name: Playlist
      description: Playlist Media ID for example a Spotify URI
  alias: Set Playlist and Play
  description: ''
nieuw_scrip:
  sequence:
  - response_variable: greetings
    action: script.get_tts_greetings
  - response_variable: weather_info
    action: script.get_weather_info
  - response_variable: briefing_data
    action: script.get_briefing_data
  - response_variable: jeff_briefing
    action: script.get_ruben_briefing
  - variables:
      message: '{{ greetings.general }}

        {{ weather_info.current_conditions}}

        {{ weather_info.sun_status }}

        {{ jeff_briefing.device_status}}

        {{ jeff_briefing.critical_battery_info }}

        '
  - action: script.battery_notification
  - data:
      message: '{{ message }}

        '
    response_variable: cleaned_briefing
    action: script.cleanup_text
  - data:
      who: livingroom
      message: '{{ cleaned_briefing.text }}

        '
      msg_summary: Gave the Jeff briefing.
      type: priority
    action: script.speech_engine
