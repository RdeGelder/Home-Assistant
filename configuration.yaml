  - platform: tod
    name: Quiet time
    after: "22:00"
    before: "06:00"
  # Ochtend
  - platform: tod
    name: Morning
    after: "00:00"
    before: "12:00"
  # Middag
  - platform: tod
    name: Midday
    after: "12:00"
    before: "18:00"
  # Avond
  - platform: tod
    name: Evening
    after: "18:00"
    before: "00:00"

