template:
  - sensor:
      - name: powerload
        unique_id: powerload
        unit_of_measurement: "W"
        device_class: power
        state: >
          {{states('sensor.solis_ac_output_total_power')|float + states('sensor.p1_meter_vermogen')|float}}
      - name: "AirQuality"
        unique_id: "airquality"
        state: >
          {% set co2_value = states('sensor.klimaat_sensor_kooldioxide') | float(default=4500) %}
          {% set temp_value = states('sensor.klimaat_sensor_temperatuur') | float(default=21) %}
          {% set humidity_value = states('sensor.werkkamerklimaat_sensor_luchtvochtigheid') | float(default=45) %}

          {# CO2 Score calculation #}
          {% if co2_value >= 4500 %}
            {% set co2_score = 0 %}
          {% elif co2_value <= 400 %}
            {% set co2_score = 100 %}
          {% else %}
            {% set co2_score = ((4500 - co2_value) / (4500 - 400)) * 100 %}
          {% endif %}

          {# Temperature scoring #}
          {% set ideal_temp = 21 %}
          {% set temp_deviation = (temp_value - ideal_temp) | abs %}
          {% if temp_deviation >= 10 %}
            {% set temp_score = 0 %}
          {% else %}
            {% set temp_score = 100 - (temp_deviation * 10) %}
          {% endif %}

          {# Humidity scoring #}
          {% if humidity_value < 30 %}
            {% set humidity_score = (humidity_value / 30) * 100 %}
          {% elif humidity_value > 60 %}
            {% set humidity_score = ((100 - humidity_value) / 40) * 100 %}
          {% else %}
            {% set humidity_score = 100 %}
          {% endif %}

          {# Final weighted score - adjusted weights to include VOC #}
          {{ ((co2_score * 0.25 +  temp_score * 0.125 + humidity_score * 0.125) | round(1)) }}

      - name: "AirQuality Alt"
        unique_id: "airquality_alt"
        state: >
          {% set co2 = states('sensor.klimaat_sensor_kooldioxide') | float %}

          {% set scores = [] %}

          {# CO2 Score #}
          {% if co2 <= 599 %}
            {% set scores = scores + [90] %}
          {% elif co2 <= 999 %}
            {% set scores = scores + [70] %}
          {% elif co2 <= 1499 %}
            {% set scores = scores + [50] %}
          {% elif co2 <= 2499 %}
            {% set scores = scores + [30] %}
          {% else %}
            {% set scores = scores + [10] %}
          {% endif %}

          {{ (scores | sum / scores | length) | round(1) }}

      ################################################################################
      ##################################### ENERGY ###################################
      ################################################################################
      - name: Import Power
        unit_of_measurement: "W"
        device_class: power
        state: >
          {% set vermogen = states('sensor.p1_meter_vermogen')|float %}
          {% if vermogen >= 0 -%}
              {{vermogen}}
            {% else %}
              0
            {% endif%}
      - name: Export Power
        unit_of_measurement: "W"
        device_class: power
        state: >
          {% set vermogen = states('sensor.p1_meter_vermogen')|float %}
          {% if vermogen < 0 -%}
              {{vermogen * -1}}
            {% else %}
              0
            {% endif%}

      - name: lights_on_count
        unique_id: lightsoncount
        state: >
          {% set lights_on = states.light 
            | selectattr('state', 'eq', 'on') 
            | list 
            | count %}
          {{ lights_on }}
