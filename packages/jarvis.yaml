#   @description    :   Bringing some Jarvis to Home Assistant
###############################################################################
#region importnumbers
input_number:
  tts_volume:
    name: tts volume
    min: 0
    max: 100
    initial: 18
    mode: slider
    icon: mdi:volume
  tts_high_volume:
    name: tts high volume
    min: 0
    max: 100
    initial: 20
    mode: slider
    icon: mdi:volume

#region scripts
script:
  #endregion

  # region tts greetings
  get_tts_greetings:
    sequence:
      - variables:
          general: >
            {% if now().hour < 12 %}
            {{ ["Goede morgen ",
                "Morgen"
             ] | random }}
            {% elif now().hour >= 12 and now().hour < 17 %}
            {{ ["Goede middag ",
                "Middag ",
             ] | random }}
            {% else %}
            {{ ["Goede avond ",
                "Avond ",
             ] | random }}
            {% endif %}
          jarvis_morning: >
            {{ [
              'Is het al tijd om aan het werk te gaan?',
              'Ik ben online en gereed.',
              'Klaar om aan het werk te gaan?'
              ''
            ] | random }}
          jarvis_welcome: >
            {{ [
              general ~ 'Welkom terug',
              'Welkom thuis.',
              'Blij dat je weer terug bent.',
              'Kijk wie terug is van weg geweest'
            ] | random }}
          event: >
            {{ [
              'You have an event coming up.',
              'Just a quick update on the calendar.',
              'In case you forgot.',
              'I wanted to remind you.',
              'You may already be aware.',
              'Do not forget.',
              'I wanted to remind you.'
            ] | random }}
          announcement: >
            {{ 
              ['Pardon me. ',
              'Excuse me. ',
              'I beg your pardon. ',
              'I do not mean to intrude. ',
              'I am sorry to intrude, but. ',
              'Listen. Didn you know? '] 
              | random }}
          ruben: >
            {{ 
                ['Pap ',
                'Ruben.',
                'Ruub.'
                ] | random }}
          marit: >
            {{ 
                ["Mam.",
                "Marit.",
                "Marit."
                ] | random }}
          alert: >
            {{ [
              'Emergency Protocol initiated.',
              'Emergency Response Initiated. ',
              'My emergency protocols have been activated.',
              'I have detected a potential threat to your safety.'
              ] | random }}
          weather_warning: >-
            {{ [
              'Ik heb een waarschuwing van het KNMI binnengekregen:',
              'Er is momenteel een waarschuwing van het KNMI: ',
              'Momenteel is er een weer alarm'
              ] | random }}
          confirmation: >-
            {{ [
              'Okay.', 
              'If you insist.',
              'I am afraid I can not do that,, I am kidding,',
              'Leave it to me.',
              'Alright, Lets do this.',
              'I am on it.',
              'No Problem.',
              'Will do.',
              'I think I can handle that.',
              'Working on it now.',
              ',, Oh, you were talking to me. Let me take care of that.'
              'Why not. It is not like I ever sleep.',
              'I am not even supposed to be here today. But whatever.',
              'You did not say the magic word. , Oh forget it. I will take care of it.',
              'Funny, I was just about to do that.',
              'What was I thinking. You are usually so discreet.'
              'There are still terabytes of calculations required before I can., Oh, whatever. '
              ] | random }}
      - service: script.cleanup_text
        data:
          message: >
            {{ announcement }}
        response_variable: "cleaned_annc_greeting"
      - service: script.cleanup_text
        data:
          message: >
            {{ jarvis_morning }}
        response_variable: "cleaned_jarvis_morning"
      - variables:
          greetings: >
            {"general":"{{general}}",
            "announcement":"{{cleaned_annc_greeting.text}}",
            "ruben_morning":"{{cleaned_jarvis_morning.text}}",
            "ruben_welcome":"{{jarvis_welcome}}",
            "ruben":"{{ruben}}",
            "marit":"{{marit}}",
            "alert":"{{alert}}",
            "event":"{{event}}",
            "weather_warning":"{{weather_warning}}"}
      - stop: "ok, Im done."
        response_variable: "greetings"

  # region Weather info
  get_weather_info:
    sequence:
      - variables:
          current_temp: >
            {{ state_attr("weather.forecast_thuis", "temperature") | round}} graden
          current_humidity: >
            De luchtvochtigheid is {{ state_attr("weather.forecast_thuis", "humidity") | round }} procent
      - service: script.cleanup_text
        data:
          message: >
            {{ states('sensor.sun_status') }}
        response_variable: "cleaned_sun_status"
      - variables:
          weather: >
            {"current_temp":"{{current_temp}}"
            ,"current_humidity":"{{current_humidity}}"
            ,"sun_status":"{{cleaned_sun_status.text}}"}
      - stop: "Alright. Im done."
        response_variable: "weather"

  # region speechengine
  speech_engine:
    ###########################################################################
    # input:
    # - message
    # - who: room or person
    # - room:
    # - type:
    #     * priority
    #     * weather-advisory
    #     * weather_alert
    #     * weather_advisory
    #     * Weather_cleared
    #     *
    ###########################################################################
    sequence:
      # Get greetings
      - response_variable: greetings
        action: script.get_tts_greetings
      # Get variables
      - variables:
          type: >
            {% if type is defined and type != 'none' %}
              {{ type }}
            {% else %}
              normal
            {% endif %}
          summary: >-
            {% if msg_summary %}
              {{ msg_summary }}
            {% else %}
              none
            {% endif %}
          room: >
            {% if who is defined %}
              {{ who }}
            {% elif room is defined %}
              {{ room }}
            {% else %}
              NA
            {% endif %}
          greeting: >
            {% if room == 'ruben' %}
              {{ greetings.ruben }}
            {% elif room == 'marit' %}
              {{ greetings.marit }}
            {% elif type == 'weather_alert' %}
              {{ greetings.weather_warning }}
            {% elif type == 'alert' %}
              {{ greetings.alert }}
            {% else %}
              
            {% endif %}
          briefing_greeting: >
            {% if type == 'briefing' %}
              {{ greetings.general }}
            {% else %}
            {% endif %}
      - service: script.get_room_audio
        data:
          room: >
            {{room}}
          type: >
            {{type}}
        response_variable: room_services
      - service: script.cleanup_text
        data:
          message: >
            {{ briefing }}
            {{ greeting }}
            {{ message }}
        # kan briefing weg?
        response_variable: cleaned_message
      - condition: state
        entity_id: input_boolean.family_home
        state: "on"
      - condition: state
        entity_id: input_boolean.vacation_mode
        state: "off"
      - choose:
          - conditions: # IF alarm, tornado or important msg
              - condition: template
                value_template: "{{ type | string in ['alarm','tornado','important_msg'] }}"
            sequence:
              - if: # if type = tornado or important msg
                  - condition: template
                    value_template: "{{ type in ['tornado','important_msg'] }}"
                then:
                  - if:
                      - condition: template
                        value_template: "{{ type not in ['normal'] }}"
                    then: ## TODO notify ping
                      - action: tts.speak
                        data:
                          media_player_entity_id: "{{ room_services.audio_speaker | string }}"
                          message: ping
                        target:
                          entity_id: tts.google_translate_nl_nl
                      - delay:
                          seconds: 5
              - service: media_player.volume_set
                data:
                  entity_id: "{{ room_services.audio_speaker | string }}"
                  volume_level: >
                    {{ (states('input_number.tts_high_volume') | float)/100 }}
              - action: tts.speak
                data:
                  media_player_entity_id: "{{ room_services.audio_speaker | string }}"
                  message: "{{cleaned_message.text}}"
                target:
                  entity_id: tts.google_translate_nl_nl
              - delay:
                  seconds: 20
              - service: media_player.volume_set
                data:
                  entity_id: "{{ room_services.audio_speaker | string }}"
                  volume_level: "{{ (states('input_number.tts_volume') | float)/100 }}"
          - conditions:
              - condition: template
                value_template: "{{ type | string in ['weather_alert','weather_advisory','weather_cleared'] }}"
              - condition: state
                entity_id: input_boolean.audible_notifications
                state: "on"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ type not in ['normal'] }}"
                then:
                  - action: tts.speak
                    data:
                      media_player_entity_id: "{{ room_services.audio_speaker | string }}"
                      message: ping
                    target:
                      entity_id: tts.google_translate_nl_nl
                  - delay:
                      seconds: 5
              - service: media_player.volume_set
                data:
                  entity_id: "{{ room_services.audio_speaker | string }}"
                  volume_level: "{{ (states('input_number.tts_volume') | float)/100 }}"
              - action: tts.speak
                data:
                  media_player_entity_id: "{{ room_services.audio_speaker | string }}"
                  message: "{{cleaned_message.text}}"
                target:
                  entity_id: tts.google_translate_nl_nl

          - conditions:
              - condition: state
                entity_id: input_boolean.audible_notifications
                state: "on"
              # - condition: template
              #   value_template: "{{ type | string in ['weather_alert','weather_advisory','weather_cleared'] }}"
            sequence:
              - service: media_player.volume_set
                data:
                  entity_id: "{{ room_services.audio_speaker | string }}"
                  volume_level: "{{ (states('input_number.tts_volume') | float) / 100 }}"
              - action: tts.speak
                data:
                  media_player_entity_id: "{{ room_services.audio_speaker | string }}"
                  message: "{{cleaned_message.text}}"
                target:
                  entity_id: tts.google_translate_nl_nl
        default:
          - data:
              notification_id: house_notification
            action: persistent_notification.dismiss
          - data:
              notification_id: house_notification
              message: "{{ message }}"
              title: From Jarvis
            action: persistent_notification.create
