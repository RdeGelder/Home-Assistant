type: vertical-stack
cards:
  - type: custom:button-card
    entity: media_player.woonkamer
    show_icon: false
    show_name: false
    show_entity_picture: true
    styles:
      card:
        - padding: 0px
      entity_picture:
        - width: 100%
        - height: auto
  - type: custom:button-card
    entity: media_player.woonkamer
    show_icon: false
    show_name: true
    name: >
      [[[return entity.attributes.media_title + '<br> <span
      style="font-size:0.6em">' + entity.attributes.media_artist]]]
    styles:
      card:
        - background: none
        - padding: 40px 0px 10px 0px
      name:
        - font-size: 20px
  - type: custom:paper-buttons-row
    styles:
      flex-wrap: nowrap
      justify-content: center
      padding: 20px 0px
      background: none
    buttons:
      - icon: |
          {%- if state_attr('media_player.woonkamer', 'shuffle')  -%}
            mdi:shuffle-variant
          {%- else -%}
            mdi:shuffle-disabled
          {%- endif -%}
        tap_action:
          action: call-service
          service: script.media_player_shuffle
          service_data:
            target_player: media_player.woonkamer
        styles:
          button:
            background: none
            width: 40px
            height: 40px
            flex-shrink: 0
          icon:
            color: white
      - icon: mdi:skip-backward
        tap_action:
          action: call-service
          service: media_player.media_previous_track
          target:
            entity_id: media_player.woonkamer
        styles:
          button:
            background: none
            width: 40px
            height: 40px
            flex-shrink: 0
          icon:
            color: white
      - icon: |
          {%- if is_state('media_player.woonkamer', 'paused') -%}
            mdi:play
          {%- else -%}
            mdi:pause
          {%- endif -%}
        tap_action:
          action: call-service
          service: media_player.media_play_pause
          target:
            entity_id: media_player.woonkamer
        styles:
          button:
            background: |-
              {% if is_state('media_player.woonkamer', 'playing') %}
                linear-gradient(145deg, rgba(255,220,178,1) 0%, rgba(255,176,233,1)
              60%, rgba(104,156,255,1) 150%) {% else %}
                white
              {% endif %}
            width: 80px
            height: 80px
            flex-shrink: 0
            border-radius: 50%
          icon:
            color: black
      - icon: mdi:skip-forward
        tap_action:
          action: call-service
          service: media_player.media_next_track
          target:
            entity_id: media_player.woonkamer
        styles:
          button:
            background: none
            width: 40px
            height: 40px
            flex-shrink: 0
          icon:
            color: white
      - icon: |
          {%- if state_attr('media_player.woonkamer', 'repeat') == 'all' -%}
            mdi:repeat
          {%- elif state_attr('media_player.woonkamer', 'repeat') == 'one' -%}
            mdi:repeat-once
          {%- else -%}
            mdi:repeat-off
          {%- endif -%}
        tap_action:
          action: call-service
          service: script.media_player_herhaling
          service_data:
            target_player: media_player.woonkamer
        styles:
          button:
            background: none
            width: 40px
            height: 40px
            flex-shrink: 0
          icon:
            color: white
  - type: vertical-stack
    cards:
      - type: custom:layout-card
        layout_type: custom:grid-layout
        layout:
          grid-template-columns: 70px 1fr 70px
          grid-template-rows: 30px
          grid-template-areas: |
            "one two three"
        cards:
          - type: custom:button-card
            view_layout:
              grid-area: one
            name: Woonkamer
            entity: media_player.woonkamer
            show_icon: false
            state:
              - value: playing
                styles:
                  card:
                    - background: >-
                        linear-gradient(145deg, rgba(255,220,178,1) 0%,
                        rgba(255,176,233,1) 60%, rgba(104,156,255,1) 150%)
              - value: paused
                styles:
                  card:
                    - background: none
            styles:
              card:
                - padding: 6px 0
                - overflow: visible
                - background: none
              name:
                - font-size: 14px
                - font-weight: 500
          - type: custom:my-slider-v2
            entity: media_player.woonkamer
            mode: volume
            view_layout:
              grid-area: two
            allowTapping: false
            allowSliding: true
            styles:
              container:
                - overflow: visable
              card:
                - height: 8px
                - margin-top: 10px
                - background: "#494949"
              progress:
                - background: >-
                    linear-gradient(145deg, rgba(255,220,178,1) 0%,
                    rgba(255,176,233,1)
                - border-radius: 4px
              track:
                - background: none
              thumb:
                - width: 18px
                - height: 18px
                - background: white
                - border-radius: 50%
                - top: "-5px"
          - type: custom:button-card
            view_layout:
              grid-area: three
            entity: media_player.woonkamer
            name: >-
              [[[return Math.floor(entity.attributes.volume_level * 100) +
              '%']]]
            show_icon: false
            styles:
              card:
                - background: none
                - padding: 6px 0
                - overflow: visible
              name:
                - font-size: 14px
                - font-weight: 500
