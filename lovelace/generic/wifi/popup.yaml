# lovelace_gen
type: vertical-stack
cards:
  - type: custom:bubble-card
    card_type: pop-up
    name: Wifi
    icon: mdi:wifi
    state: null
    hash: "#wifi"
    is_sidebar_hidden: true
    styles: >-
      .bubble-pop-up-container {
        --vertical-stack-card-gap: 0px!important;
      } #header-container > div > div {
        background: var(--popupBG)!important;
      }     

      #header-container > button {background: none;}    

      .icon-container {background-color:var(--gray800)!important;} 

      .icon-container > ha-icon
      {color:var(--gray000)!important;opacity:1!important} 

      .bubble-icon {
        --mdc-icon-size: 24px !important;
      }
    bg_blur: "20"
    shadow_opacity: "20"
    bg_opacity: "88"
    margin_top_mobile: 50px
    margin_top_desktop: 50px
    card_layout: large
  - type: vertical-stack
    cards:
      - type: custom:gap-card
        height: 12
      - type: custom:button-card
        entity: person.ruben
        show_icon: false
        show_name: false
        custom_fields:
          user: >
            [[[ 

            return '<ha-icon icon="mdi:wifi" style="transform: translate(0,
            -3px);padding-right: 15px; width:26px; height: 26px; color:
            var(--gray800);"> </ha-icon>' + 'MY_WLAN'

            ]]]
          pass: >
            [[[ 

            return '<ha-icon icon="mdi:lock" style="transform: translate(0,
            -2px);padding-right: 15px; width:26px; height: 26px; color:
            var(--gray800);"> </ha-icon>' + '{{wifi_password}}'

            ]]]
          icon: |
            [[[
              return '<img src = "/local/images/Wi-Fi_QR_code_MY_WLAN.jpg" width="150" height="150" />'
            ]]]
        styles:
          grid:
            - grid-template-areas: '"icon user" "icon pass"'
            - grid-template-columns: max-content 1fr
            - grid-template-rows: 1fr 1fr
          card:
            - background: var(--popupBG)
            - padding-left: 16px
          custom_fields:
            user:
              - justify-self: start
              - font-size: 1em
              - align-self: end
              - padding-bottom: 6px
              - color: var(--gray800)
            pass:
              - justify-self: start
              - padding-top: 6px
              - font-size: 1em
              - align-self: start
              - color: var(--gray800)
            icon:
              - justify-self: center
              - border-radius: 10px
              - align-self: center
              - padding-right: 16px
              - padding-bottom: "-8px"
              - color: var(--gray800)
