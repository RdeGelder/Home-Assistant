room_conditions:
  variables:
    background: var(--popupBG)
    entity: null
    temp: >
      [[[ return
      Math.round((states['sensor.temperatur_stue_temperature'].state) * 10)/10
      + '°' + '<span style="font-size:0.3em">' +
      Math.round((states['sensor.temperatur_stue_humidity'].state) * 10)/10 +
      '%']]]
  show_icon: false
  show_name: false
  show_label: true
  custom_fields:
    temp: "[[[ return variables.temp ]]]"
    graph:
      card:
        type: custom:mini-graph-card
        entities:
          - entity: "[[[ return variables.entity ]]]"
            color: var(--red)
        line_width: 0
        height: 100
        show:
          icon: false
          name: false
          state: false
          legend: false
          labels: false
        card_mod:
          style: |
            ha-card {
              border-style: none;
              background: none;
            }
  styles:
    grid:
      - grid-template-areas: '"temp"'
      - grid-template-columns: 1fr
      - grid-template-rows: min-content
    card:
      - padding: 24px
      - background: "[[[ return variables.background ]]]"
    custom_fields:
      temp:
        - justify-self: start
        - text-align: left
        - font-size: 66px
        - color: var(--gray800)
        - line-height: 66px
        - font-weight: 300
        - padding: 12px 0 0 0
      graph:
        - position: absolute
        - width: 100%
        - left: 0
        - bottom: 0
