toggle_card:
  variables:
    var_entity: null
    var_name: null
    var_icon_on: mdi:toggle-switch
    var_icon_off: mdi:toggle-switch-off
  name:
  show_icon: true
  icon: "[[[variables.var_icon_on ]]]"
  tap_action:
    action: toggle
  state:
    - value: "off"
      icon: "[[[variables.var_icon_off ]]]"
      styles:
        card:
          - background: black
        icon:
          - color: white
        name:
          - color: white
        custom_fields:
          state:
            - color: white
  styles:
    grid:
      - grid-template-areas: '"i i""n n ""state icon"'
      - grid-template-columns: 1fr 1fr
      - grid-template-rows: 1fr min-content min-content
    card:
      - padding: 20px
    name:
      - justify-self: start
      - font-size: 14px
      - color: black
      - capacity: "0.7"
      - padding: 2px 0px
    icon:
      - width: 24px
      - color: black
    img_cell:
      - justify-self: start
      - width: 24px
      - height: 24px
      - padding-bottom: 18px
    custom_fields:
      icon:
        - justify-self: end
        - margin-top: "-9px"
      state:
        - justify-self: start
        - font-size: 16px
        - font-weitht: 500
        - color: black
        - margin-top: "-9px"
  custom_fields:
    icon: |
      [[[
        var state = entity.state;
        if(state == "on")
          return '<ha-icon icon= "mdi:toggle-switch" style = "color: #99BC85 ; width:50px; height:50p">'
        else
          return '<ha-icon icon= "mdi:toggle-switch-off" style = "color: white ; width:50px; height:50p">'
      ]]]
    state: |
      [[[
        var state = entity.state;
        if(state == "on")
          return 'on';     
        else
          return 'off';
      ]]]
weather_hour:
  variables:
    var_cond: "[[[ return entity.attributes.forc1d_condition ]]]"
    var_hum: "[[[ return entity.attributes.forc1d_humidity ]]]"
    var_prec: "[[[ return entity.attributes.forc1d_precipitation]]]"
    var_day: "[[[ return entity.attributes.forc1d_datetime]]]"
    var_temp: "[[[ return entity.attributes.forc1d_temp]]]"
    var_feels_like: "[[[ return entity.attributes.forc1d_feels_like]]]"
    var_wind_bft: "[[[ return entity.attributes.forc1d_wind_bft]]]"
    var_wind_dir: "[[[ return entity.attributes.forc1d_wind_dir]]]"
    var_icon: "[[[ return entity.attributes.forc1d_icon]]]"
  entity: sensor.detailed_weather
  show_icon: false
  show_name: false
  show_label: false
  custom_fields:
    cond: |
      [[[ 
        return variables.var_cond
      ]]]
    hum: |
      [[[
        return 'Hum: '+variables.var_hum +
        '%' 
      ]]]
    prec: |
      [[[
        return variables.var_prec + 'mm'
      ]]]
    day: |
      [[[
        return helpers.formatTimeWeekday(variables.var_day)
      ]]]
    temp: |
      [[[ 
        return variables.var_temp + 
        '°<span style="font-size: 0.3em">' +
        variables.var_feels_like+ '°' 
      ]]]
    icon: |
      [[[ 
        return '<img src = "' + variables.var_icon
        +  '" width="70" height="70" />' 
      ]]]
    wind: |
      [[[ 
        return '<img src = "' 
        + '/local/weather/wind/wind-beaufort-'
        + variables.var_wind_bft
        +'.svg" width="70" height="70" />' 
      ]]]
    wind_dir: |
      [[[
        return variables.var_wind_dir
      ]]]
  styles:
    grid:
      - grid-template-areas: >-
          "day day day day day day" "temp temp temp wind . icon" "temp temp
          temp wind . icon" "hum prec prec wind_dir cond cond"
      - grid-template-columns: 1fr min-content min-content min-content
    card:
      - padding: 14px
      - margin-bottom: 12px
      - background: var(--popupBG)
      - box-shadow: none !important
    custom_fields:
      day:
        - justify-self: start
      temp:
        - justify-self: start
        - font-size: 2.5em
        - font_weight: 400
      feels_like:
        - jutify-self: start
      icon:
        - justify-self: end
      wind:
        - justify-self: end
      hum:
        - justify-self: start
      prec:
        - justify-self: start
  columns: 1
