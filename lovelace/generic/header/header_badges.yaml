# Vakantie modus
- type: entity
  show_name: false
  show_state: false
  show_icon: true
  entity: input_boolean.vacation_mode
  color: orange
  tap_action:
    action: toggle
  visibility:
    - condition: state
      entity: input_boolean.vacation_mode
      state: "on"

