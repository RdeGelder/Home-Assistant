                      - 2de: hide
                      - alles: hide
              - type: custom:button-card
                template: chips_small
                view_layout:
                  grid-area: 1ste
                variables:
                  icon: mdi:home-floor-1
                tap_action:
                  action: fire-dom-event
                  local_conditional_card:
                    action: set
                    ids:
                      - favo: hide
                      - begane: hide
                      - 1ste: show
                      - 2de: hide
                      - alles: hide
              - type: custom:button-card
                template: chips_small
                view_layout:
                  grid-area: 2de
                variables:
                  icon: mdi:home-floor-2
                tap_action:
                  action: fire-dom-event
                  local_conditional_card:
                    action: set
                    ids:
                      - favo: hide
                      - begane: hide
                      - 1ste: hide
                      - 2de: show
                      - alles: hide
            {% set n_rooms = (_global.rooms_all|list|count) %}
          - type: custom:layout-card
            layout_type: custom:grid-layout
            layout:
              grid-template-columns: 1fr 1fr
              grid-template-rows: 146px 70px 146px 70px 146px 70px 146px 70px 146px
              grid-template-areas: |
                "z1 z2" "z1 z3" "z4 z3" "z4 z5" "z6 z5" 
                "z6 z7" "z8 z7" "z8 z9" "z10 z9" "z10 z11"
            cards:
              {% set n_rooms = (_global.rooms_all|list|count) %}
              {% for room in _global.rooms_all %}
              - type: custom:button-card
                view_layout:
                  grid-area: z{{loop.index}}
                template: room_card
                variables:
                  name: |
                    [[[ return '{{room}}']]]
                  icon: |
                    [[[return hass.areas['{{room}}'].icon]]]
                  path: "#{{room}}"
                  state: |
                    [[[
                      var temp = states['sensor.gang_beweging_licht'].state;
                      var hum = states['sensor.gang_beweging_licht'].state;
                      return `
                      ${parseFloat(temp).toFixed(0)}°<span style="font-size:
                    0.3em;opacity:0.7">${parseFloat(hum).toFixed(0)} Lux</span>
                      `
                    ]]]
                  background: var(--gray000)
                  color: var(--{{rooms[room].color if room in rooms else 'blue' }})
                  text: var(--gray800)
                  {% if loop.index == 1 %}
                  radius: 36px 36px 6px 36px
                  {% elif loop.index == 2 %}
                  radius: 36px 36px 36px 6px
                  {% elif (loop.index % 2) == 0 and (loop.index == n_rooms or loop.index == n_rooms-1)%}
                  radius: 36px 6px 36px 36px
                  {% elif (loop.index % 2) == 1 and (loop.index == n_rooms or loop.index == n_rooms-1)%}
                  radius: 6px 36px 36px 36px
                  {% elif (loop.index % 2) == 0 %}
                  radius: 36px 6px 6px 36px
                  {% elif (loop.index % 2) == 1 %}
                  radius: 6px 36px 36px 6px
                  {% else %}
                  radius: 36px 36px 36px 36px
                  {% endif %}
              {% endfor %}
