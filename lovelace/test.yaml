        visibility:
          - condition: screen
            media_query: "(min-width: 768px)"
        # region mobile rooms
      - type: grid
        cards:
          - type: vertical-stack
            cards:
              - type: custom:bubble-card
                card_type: separator
                name: Rooms
                icon: mdi:floor-plan
                sub_button:
                  - entity: input_boolean.rooms_quick_access
                    tap_action:
                      action: toggle
                    visibility:
                      - condition: user
                        users:
                          - fb506dcbb14a480f936e12028d53db9c
                  - entity: input_boolean.all_rooms
                    name: Show all
                    show_name: true
                    tap_action:
                      action: toggle
                styles: |-
                  .bubble-sub-button-1 {
                      background-color: ${hass.states['input_boolean.rooms_quick_access'].state === 'on' ? 'var(--green)' : 'var(--contrast1)'} !important;
                      color: ${hass.states['input_boolean.rooms_quick_access'].state === 'on' ? 'var(--black)' : 'var(--contrast20)'} !important;
                  }
                  .bubble-sub-button-2 {
                      background-color: ${hass.states['input_boolean.all_rooms'].state === 'on' ? 'var(--purple)' : 'var(--contrast1)'} !important;
                      color: ${hass.states['input_boolean.all_rooms'].state === 'on' ? 'var(--black)' : 'var(--contrast20)'} !important;
                  }

              ################################################################ Quick Access ################################################################################################
              - type: custom:bubble-card
                card_type: empty-column
                visibility:
                  - condition: state
                    entity: input_boolean.rooms_quick_access
                    state: "on"
              - type: vertical-stack
                cards:
                  #werkkamer
                  - type: custom:bubble-card
                    card_type: climate
                    button_type: slider
                    entity: climate.woonkamer
                    icon: mdi:lightbulb-group
                    tap_action:
                      action: perform-action
                      perform_action: light.toggle
                      target:
                        entity_id: light.zigbee_werkkamer
                    sub_button:
                      - entity: select.technische_ruimte_wasmachine_opstartgedrag
                        icon: mdi:television
                      - entity: media_player.livingroom
                        icon: mdi:music
                        tap_action:
                          action: perform-action
                          perform_action: script.play_on_repeat_on_living_room_nest
                          target: {}
                    force_icon: false
                    show_state: true
                    show_last_changed: false
                    show_attribute: true
                    state_color: false
                    slider_live_update: false
                    name: Werkkamer
                    attribute: current_temperature
                    styles: >-
                      .bubble-icon {
                        color: ${hass.states['light.zigbee_werkkamer'].state === 'on' ? 'var(--black)' : 'var(--contrast20)'} !important;
                      }

                      ha-card {
                        --bubble-icon-background-color: ${hass.states['light.zigbee_werkkamer'].state === 'on' ? 'var(--yellow)' : 'var(--contrast1)'} !important;
                      }

                      .bubble-sub-button-1 {
                          background-color: ${hass.states['remote.harmony_hub'].state === 'on' ? 'var(--purple)' : 'var(--contrast3)'} !important;
                          color: ${hass.states['remote.harmony_hub'].state === 'on' ? 'var(--black)' : 'var(--contrast20)'} !important;
                      }

                      .bubble-sub-button-2 {
                          background-color: ${hass.states['media_player.office'].state === 'playing' ? 'var(--green)' : 'var(--contrast3)'} !important;
                          color: ${hass.states['media_player.office'].state === 'playing' ? 'var(--black)' : 'var(--contrast20)'} !important;
                      }

                      ${icon.setAttribute("icon",
                      hass.states['light.zigbee_werkkamer'].state === 'on' ?
                      'mdi:lightbulb-group' : 'mdi:lightbulb-group-outline')}
                    visibility:
                      - condition: state
                        entity: input_boolean.rooms_quick_access
                        state: "on"
                      - condition: state
                        entity: sensor.ruben_mobiel_area
                        state: Werkkamer
                  # Woonkamer
                  - type: custom:bubble-card
                    card_type: climate
                    button_type: slider
                    entity: climate.woonkamer
                    icon: mdi:lightbulb-group
                    tap_action:
                      action: perform-action
                      perform_action: light.toggle
                      target:
                        entity_id: light.zigbee_woonkamer
                    sub_button:
                      - entity: select.technische_ruimte_wasmachine_opstartgedrag
