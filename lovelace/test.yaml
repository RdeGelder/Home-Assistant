            #         state_not: "on"
            #       - condition: state
            #         entity: binary_sensor.alexa_timer_active
            #         state_not: "on"
            grid_options:
              columns: full
              rows: auto
          # Main Map
          - type: map
            entities:
              - entity: zone.home
              - entity: person.marit
              - entity: person.ruben
              - entity: person.evi
            theme_mode: auto
            # visibility:
            #   - condition: state
            #     entity: switch.security_cameras
            #     state: 'off'
            #   - condition: and
            #     conditions:
            #       - condition: state
            #         entity: sensor.washing_machine_status
            #         state: 'Off'
            #       - condition: state
            #         entity: sensor.dishwasher_status
            #         state: 'Off'
            #       - condition: state
            #         entity: switch.coffee_maker_outlet
            #         state_not: 'on'
            #       - condition: state
            #         entity: switch.fan_outlet
            #         state_not: 'on'
            #       - condition: state
            #         entity: switch.desk_webcam
            #         state_not: 'on'
            #       - condition: state
