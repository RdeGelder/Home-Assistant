            #       - condition: state
            #         entity: sensor.washing_machine_status
            #         state: "Off"
            #       - condition: state
            #         entity: sensor.dishwasher_status
            #         state: "Off"
            #       - condition: state
            #         entity: switch.coffee_maker_outlet
            #         state_not: "on"
            #       - condition: state
            #         entity: switch.fan_outlet
            #         state_not: "on"
            #       - condition: state
            #         entity: switch.desk_webcam
            #         state_not: "on"
            #       - condition: state
            #         entity: vacuum.dobby
            #         state_not: cleaning
            #       - condition: state
            #         entity: sensor.prusalink_progress
            #         state: unavailable
            #       - condition: state
            #         entity: remote.harmony_hub
            #         state: "off"
            #       - condition: state
