kiosk_mode: !include generic/templates/kiosk.yaml

# region templates
button_card_templates: !include_dir_merge_named generic/templates/button_card_templates/
decluttering_templates: !include generic/templates/decluttering_templates.yaml

views:
  # region maindashboard
  - title: home
    header: !include generic/header/header_card.yaml
    badges: !include generic/header/header_badges.yaml
    type: sections
    max_columns: 3
    path: home
    dense_section_placement: false
    subview: false
    theme: rounded-bubble
    sections:
      # region mobile
      - type: grid
        visibility:
          - condition: screen
            media_query: "(min-width: 0px) and (max-width: 767px)"
        cards:
          - type: vertical-stack
            cards:
              - type: custom:button-card
                template: custom_card_user
              - type: custom:bubble-card
                card_type: empty-column

      - type: grid
        column_span: 2
        cards:
          # region mobile map
          - type: vertical-stack
            cards:
              - type: heading
                heading: Map
                heading_style: title
                icon: mdi:map-marker-account
                badges:
                  - type: entity
                    show_state: false
                    show_icon: true
                    entity: person.ruben
                    icon: mdi:face-agent
                    color: green
                    tap_action:
                      action: more-info
                  - type: entity
                    show_state: false
                    show_icon: true
                    entity: person.marit
                    icon: mdi:face-woman
                    color: purple
                    tap_action:
                      action: more-info
                  - type: entity
                    show_state: false
                    show_icon: true
                    entity: person.evi
                    icon: mdi:baby
                    color: brown
                    tap_action:
                      action: more-info
                  - type: entity
                    show_state: false
                    show_icon: true
                    entity: person.guest
                    icon: mdi:account-group
                    color: orange
                    tap_action:
                      action: more-info
