                    show_state: true
                    show_last_changed: false
                    show_attribute: true
                    state_color: false
                    slider_live_update: false
                    name: Living Room
                    attribute: current_temperature
                    styles: >-
                      .bubble-icon {
                        color: ${hass.states['light.zigbee_woonkamer'].state === 'on' ? 'var(--black)' : 'var(--contrast20)'} !important;
                      }

                      ha-card {
                        --bubble-icon-background-color: ${hass.states['light.zigbee_woonkamer'].state === 'on' ? 'var(--yellow)' : 'var(--contrast1)'} !important;
                      }

                      .bubble-sub-button-1 {
                          background-color: ${hass.states['remote.harmony_hub'].state === 'on' ? 'var(--purple)' : 'var(--contrast3)'} !important;
                          color: ${hass.states['remote.harmony_hub'].state === 'on' ? 'var(--black)' : 'var(--contrast20)'} !important;
                      }

                      .bubble-sub-button-2 {
                          background-color: ${hass.states['media_player.livingroom'].state === 'playing' ? 'var(--green)' : 'var(--contrast3)'} !important;
                          color: ${hass.states['media_player.livingroom'].state === 'playing' ? 'var(--black)' : 'var(--contrast20)'} !important;
                      }

                      ${icon.setAttribute("icon",
                      hass.states['light.zigbee_woonkamer'].state === 'on' ?
                      'mdi:lightbulb-group' : 'mdi:lightbulb-group-outline')}
                    visibility:
                      - condition: state
                        entity: input_boolean.rooms_quick_access
                        state: "on"
                      - condition: state
                        entity: sensor.ruben_mobiel_area
                        state: Woonkamer
              - type: grid
                square: false
                columns: 2
                cards:
                  - type: vertical-stack
                    cards:
                      - type: custom:button-card
                        template: room_template
                        variables:
                          icon: mdi:bed-king-outline
                          light: light.slaapkamer_plafond
                          climate: climate.woonkamer
                          window_sensor: binary_sensor.badkamer
                          motion_sensor: binary_sensor.gang_beweging
                          media_player: media_player.livingroom
                          navigation_path: "#bedroom"
                        entity: input_boolean.room_toggle_bedroom
                        name: Slaapkamer
                  - type: vertical-stack
                    cards:
                      - type: custom:button-card
                        template: room_template
                        variables:
                          icon: mdi:sofa-outline
                          light: light.zigbee_woonkamer
                          climate: climate.woonkamer
                          window_sensor: binary_sensor.achterdeur_openen
                          motion_sensor: binary_sensor.gang_beweging
                          media_player: media_player.livingroom
                          navigation_path: "#living-room"
                        entity: input_boolean.room_toggle_living_room
                        name: Woonkamer
                  - type: conditional
                    conditions:
                      - condition: state
                        entity: input_boolean.all_rooms
                        state: "on"
                    card:
                      type: vertical-stack
                      cards:
                        - type: custom:button-card
                          template: room_template
                          variables:
                            icon: mdi:bed-double-outline
                            light: light.zigbee_woonkamer
                            climate: climate.woonkamer
                            window_sensor: binary_sensor.badkamer
                            motion_sensor: binary_sensor.ikea_of_sweden_vallhorn_wireless_motion_sensor
                            media_player: media_player.office
                            navigation_path: "#kitchen"
                          entity: input_boolean.room_toggle_guest_room
                          name: Logeerkamer
                  - type: vertical-stack
                    cards:
                      - type: custom:button-card
                        template: room_template
                        variables:
                          icon: mdi:monitor
                          light: light.zigbee_werkkamer
                          climate: climate.woonkamer
                          window_sensor: binary_sensor.werkkamer_raam_openen
                          motion_sensor: binary_sensor.gang_beweging
                          media_player: media_player.office
                          navigation_path: "#user"
                        entity: input_boolean.room_toggle_living_room
                        name: Office
                  - type: vertical-stack
                    cards:
                      - type: custom:button-card
                        template: room_template
                        variables:
                          icon: mdi:fridge-outline
                          light: light.zigbee_werkkamer
                          climate: climate.woonkamer
                          window_sensor: binary_sensor.keuken_raam_openen
