    - title: Forecast
      icon: mdi:weather-partly-cloudy
      card:
        type: vertical-stack
        cards:
          - type: horizontal-stack
            cards:
              - type: custom:stack-in-card
                mode: vertical
                cards:
                  - type: custom:streamline-card
                    template: title_subtitle_card
                    variables:
                      - title: Forecast
                      - subtitle: >-
                          {{ states ('sensor.werkkamer_temperature')
                          }}
                    uix:
                      style: |
                        ha-card {
                          padding-right: 120px;
                        }
                  - type: custom:mushroom-chips-card
                    chips:
                      - type: template
                        icon: mdi:weather-lightning
                        content: MetService
                        tap_action:
                          action: url
                          url_path: https://www.metservice.com/warnings/home
                        uix:
                          style:
                            .: |
                              ha-card {
                                --text-color: black;
                                --color: green;
                                --chip-background: blue;
                              }
                    uix:
                      style: |
                        ha-card {
                          position: absolute;
                          top: 20px;
                          right: 2px;
                        }
