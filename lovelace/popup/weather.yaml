- type: custom:bubble-card
  card_type: pop-up
  hash: "#weather-panel"
  name: Weather Panel
  icon: mdi:weather-cloudy-arrow-right
  styles: |-
    #root {
            max-height: 100% !important;
            transition: transform 500ms cubic-bezier(0.38, 1.21, 0.22, 1.00) !important;
          }
          .bubble-pop-up-container {
            padding-bottom: 64px !important;


          }
  button_type: name
  sub_button:
    main: []
    bottom: []
  slider_fill_orientation: left
  slider_value_position: right
- type: custom:simple-tabs
  pre-load: true
  active-background: black #var(--md-sys-color-primary)
  active-text-color: white #var(--md-sys-color-on-primary)
  text-color: white #var(--primary-text-color)
