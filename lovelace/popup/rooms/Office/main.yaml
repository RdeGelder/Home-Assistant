- square: false
  columns: 3
  type: grid
  cards:
    # Bureau Ruben
    - type: custom:button-card
      entity: switch.bueau_ruben
      icon: mdi:desktop-tower
      name: Bureau Ruben
      label: >-
        [[[return
        states["switch.bueau_ruben"].state]]]
      template: button_template
      variables:
        icon2: mdi:desktop-tower
        icon_off: mdi:desktop-tower
        icon_on: mdi:desktop-tower
        background_color_on: var(--orange)
        color_on: var(--black)
    # Bureau Marit
    - type: custom:button-card
      entity: switch.bureau_marit
      icon: mdi:desktop-tower
      name: Bureau Marit
      label: >-
        [[[return
        states["switch.bureau_marit"].state]]]
      template: button_template
      variables:
        icon2: mdi:desktop-tower
        icon_off: mdi:desktop-tower
        icon_on: mdi:desktop-tower
        background_color_on: var(--orange)
        color_on: var(--black)
