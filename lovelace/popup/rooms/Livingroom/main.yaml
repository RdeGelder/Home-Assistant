  columns: 1
- type: heading
  icon: mdi:music
  heading: Media
  heading_style: title
- type: custom:swipe-card
  card_width: calc(100% - 48px)
  parameters:
    centeredSlides: true
    slidesPerView: auto
    spaceBetween: 16
    initialSlide: 0
  cards:
    - type: conditional
      conditions:
        - entity: media_player.livingroom
          state_not: standby
        - entity: media_player.livingroom
          state_not: "off"
      card:
        type: custom:button-card
        entity: media_player.livingroom
        template: custom_card_mediaplayer_music
