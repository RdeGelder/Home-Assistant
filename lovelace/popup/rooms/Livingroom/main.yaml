- type: heading
  icon: mdi:thermostat
  heading: Climate
  heading_style: title
  badges:
    - type: entity
      show_state: true
      show_icon: true
      entity: sensor.livingroom_temperatuur
      color: red
      tap_action:
        action: more-info
    - type: entity
      show_state: true
      show_icon: true
      entity: sensor.livingroom_luchtvochtigheid
      color: blue
      tap_action:
        action: more-info
- type: custom:bubble-card
  card_type: climate
  entity: climate.livingroom
  sub_button:
    - name: HVAC modes menu
      select_attribute: hvac_modes
      state_background: false
      show_arrow: false
  show_state: true
- type: heading
  icon: mdi:devices
  heading: Devices
  heading_style: title
