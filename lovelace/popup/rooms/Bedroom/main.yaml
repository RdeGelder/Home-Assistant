  #       show_arrow: false
  show_state: true
- type: heading
  icon: mdi:devices
  heading: Devices
  heading_style: title
  badges:
    # - type: entity
    #   show_state: false
    #   show_icon: true
    #   entity: input_boolean.living_room_occupancy
