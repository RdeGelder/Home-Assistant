- type: heading
  icon: mdi:thermostat
  heading: Climate
  heading_style: title
  badges:
    - type: entity
      show_state: true
      show_icon: true
      entity: sensor.slaapkamer_temperatuur
      color: red
      tap_action:
        action: more-info
    - type: entity
      show_state: true
      show_icon: true
      entity: sensor.slaapkamer_luchtvochtigheid
      color: blue
      tap_action:
        action: more-info
  # - type: custom:bubble-card
